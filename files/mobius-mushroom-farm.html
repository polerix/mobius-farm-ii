<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>MÖBIUS MUSHROOM FARM</title>
<style>
  @font-face { font-family: 'Mushroom'; src: url('Mushroom.ttf') format('truetype'); }
  *{margin:0;padding:0;box-sizing:border-box;touch-action:none}
  html,body{height:100%;background:#000}
  body{display:flex;align-items:center;justify-content:center;cursor:crosshair;overflow:hidden}
  svg{display:block;max-width:100vw;max-height:100svh;user-select:none;-webkit-user-select:none}

  @keyframes rgb-cycle{
    0%{fill:#ff2200}14%{fill:#ff8800}28%{fill:#ffee00}
    43%{fill:#00ff44}57%{fill:#00ccff}71%{fill:#cc00ff}85%{fill:#ff0088}100%{fill:#ff2200}
  }
  .eye-a{animation:rgb-cycle 1.8s linear infinite}
  .eye-b{animation:rgb-cycle 1.8s linear infinite .6s}
  .eye-c{animation:rgb-cycle 1.8s linear infinite 1.2s}

  .panel-fade{transition:opacity 0.6s ease-in-out}

  @keyframes title-glow{
    0%,100%{filter:drop-shadow(0 0 8px #00ff88) drop-shadow(0 0 18px #004422)}
    50%{filter:drop-shadow(0 0 24px #00ffaa) drop-shadow(0 0 55px #00ff66)}
  }
  #g-title{animation:title-glow 2.8s ease-in-out infinite}

  @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
  .blink{animation:blink .8s step-start infinite}

  @keyframes pu-pulse{0%,100%{opacity:1}50%{opacity:.22}}
  .pu-on{animation:pu-pulse .45s ease-in-out infinite}

  @keyframes score-pop{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-28px)}}
  .score-pop{animation:score-pop .9s ease-out forwards;pointer-events:none}

  @keyframes level-in{0%{opacity:0;transform:scale(.4)}60%{opacity:1;transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
  .level-in{animation:level-in .5s cubic-bezier(.2,1.4,.4,1) forwards}

  @keyframes wheel-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

  @keyframes mobius-twist {
    0% { transform: perspective(800px) scale(1) rotateX(0deg) rotateZ(0deg); }
    50% { transform: perspective(800px) scale(0.6) rotateX(90deg) rotateZ(180deg); }
    100% { transform: perspective(800px) scale(1) rotateX(180deg) rotateZ(360deg); }
  }
  .mobius-twist { animation: mobius-twist 1.2s cubic-bezier(0.4, 0.0, 0.2, 1) forwards; }
</style>
</head>
<body>
<svg id="game" viewBox="0 0 800 544" preserveAspectRatio="xMidYMid meet">
<defs>
  <clipPath id="clip-top"><rect x="0" y="44" width="800" height="220"/></clipPath>
  <clipPath id="clip-bot"><rect x="0" y="296" width="800" height="220"/></clipPath>
  <filter id="f-glow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="f-glow-sm" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="1.6" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="f-flash">
    <feColorMatrix type="saturate" values="0"/>
    <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
  </filter>
  <pattern id="p-scan" x="0" y="0" width="800" height="4" patternUnits="userSpaceOnUse">
    <rect x="0" y="0" width="800" height="1" fill="rgba(0,0,0,.3)"/>
  </pattern>
  <radialGradient id="g-vig" cx="50%" cy="50%" r="72%">
    <stop offset="0%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(0,0,0,.85)"/>
  </radialGradient>
  <polygon id="sburst" points="
    0,-58 5,-19 19,-50 8,-15 36,-37 10,-9 50,-19 17,-4
    58,0 17,4 50,19 10,9 36,37 8,15 19,50 5,19
    0,58 -5,19 -19,50 -8,15 -36,37 -10,9 -50,19 -17,4
    -58,0 -17,-4 -50,-19 -10,-9 -36,-37 -8,-15 -19,-50 -5,-19"
    fill="none"/>
</defs>

<!-- ══ HUD TOP — fits inside frame top bars ════════════════ -->
<!-- Left top bar: power-ups -->

  <text id="pu-txt-dual"  x="268" y="15" text-anchor="middle" font-family="Mushroom, monospace" font-size="9" fill="#aa2200">DUAL</text>

</g>

</g>

<!-- Bottom-left tab: SCORE -->

<!-- Bottom-center loops: Energy + Shield -->

<rect x="332" y="522" width="60" height="8" fill="none" stroke="#00aa66" stroke-width="1" rx="2"/>
<rect id="hud-e-bar" x="333" y="523" width="58" height="6" fill="#007744" rx="1"/>

<rect x="422" y="522" width="60" height="8" fill="none" stroke="#2255bb" stroke-width="1" rx="2"/>

  </g>

  <!-- Entity layers -->
  <g id="L-mush-top"    clip-path="url(#clip-top)"/>
  <g id="L-mush-bot"    clip-path="url(#clip-bot)"/>
  <g id="L-agents-top"  clip-path="url(#clip-top)"/>
  <g id="L-agents-bot"  clip-path="url(#clip-bot)"/>

  <!-- ── TRAIN ── -->

    <!-- Chassis (replaced by train.svg if present) -->
    <image id="img-train" href="SVG/train.svg" x="-55" y="-18" width="110" height="36" visibility="hidden"/>
    <g id="g-train-proc">
      <rect x="-47" y="-12" width="94" height="22" rx="4" fill="#181818" stroke="#303030" stroke-width="1.5"/>
      <rect x="-40" y="-8" width="16" height="12" rx="2" fill="#0b1808"/>
      <rect x="-17" y="-8" width="12" height="12" rx="2" fill="#08001a"/>
      <rect x="  6" y="-8" width="12" height="12" rx="2" fill="#000c18"/>
      <rect x=" 25" y="-8" width="16" height="12" rx="2" fill="#0b0b1e"/>
      <circle cx="-45" cy="0" r="3" fill="#ffcc00"/>
      <circle cx=" 45" cy="0" r="3" fill="#cc2000"/>
      <!-- Wheels (given IDs for rotation) -->
      <g id="wheel-l" transform="translate(-30,14)">
        <circle r="6.5" fill="#111" stroke="#333" stroke-width="1.2"/>
        <circle r="2.5" fill="#2a2a2a"/>
        <line x1="0" y1="-5" x2="0" y2="5" stroke="#333" stroke-width="1"/>
        <line x1="-5" y1="0" x2="5" y2="0" stroke="#333" stroke-width="1"/>
      </g>
      <g id="wheel-c" transform="translate(0,14)">
        <circle r="5" fill="#111" stroke="#333" stroke-width="1.2"/>
        <circle r="2" fill="#2a2a2a"/>
        <line x1="0" y1="-4" x2="0" y2="4" stroke="#333" stroke-width="1"/>
        <line x1="-4" y1="0" x2="4" y2="0" stroke="#333" stroke-width="1"/>
      </g>
      <g id="wheel-r" transform="translate(30,14)">
        <circle r="6.5" fill="#111" stroke="#333" stroke-width="1.2"/>
        <circle r="2.5" fill="#2a2a2a"/>
        <line x1="0" y1="-5" x2="0" y2="5" stroke="#333" stroke-width="1"/>
        <line x1="-5" y1="0" x2="5" y2="0" stroke="#333" stroke-width="1"/>
      </g>
    </g>
    <!-- Turret ring -->
    <circle cx="0" cy="-15" r="8.5" fill="#222" stroke="#444" stroke-width="1.5"/>
    <!-- Primary cannon (g-cannon rotates around 0,-15) -->
    <g id="g-cannon">

      </g>

    <g id="g-cannon-dual" display="none">
      <rect x="-18" y="-35" width="7" height="22" rx="3" fill="#aa4400" stroke="#cc6600" stroke-width=".8"/>
      <rect x=" 11" y="-35" width="7" height="22" rx="3" fill="#aa4400" stroke="#cc6600" stroke-width=".8"/>
      <rect x="-20" y="-37" width="10" height="4" rx="2" fill="#883300"/>
      <rect x="  9" y="-37" width="10" height="4" rx="2" fill="#883300"/>
    </g>
  </g>
</g>
<!-- end g-field -->

<!-- ══ IN-GAME HUD FRAME (overlay on top of everything) ══════ -->

<!-- ══ START SCREEN ══════════════════════════════════════════ -->
<g id="g-overlay">
  <rect x="0" y="0" width="800" height="544" fill="#000"/>

  <text x="400" y="40" text-anchor="middle" font-family="Mushroom, monospace" font-size="12" fill="#003322" letter-spacing="10">~ SUPREME EDITION ~</text>

  <!-- Perimeter centipede (JS-animated, rendered BEFORE logo so it passes behind it) -->

    <g id="cp-10" opacity="0"><image href="SVG/centipede-seg.svg" x="-13" y="-16" width="26" height="32"/></g>
    <g id="cp-9"  opacity="0"><image href="SVG/centipede-seg.svg" x="-13" y="-16" width="26" height="32"/></g>
    <g id="cp-8"  opacity="0"><image href="SVG/centipede-seg.svg" x="-13" y="-16" width="26" height="32"/></g>

const GRID_W=54, GRID_H=16;
const SVG_W=800, SVG_H=544;
const FACE0_Y=44, FACE_PX=220, TRACK_PX=32;
const TRACK_Y=FACE0_Y+FACE_PX;    // 264
const TRACK_CY=TRACK_Y+TRACK_PX/2; // 280
const FACE1_Y=TRACK_Y+TRACK_PX;   // 296
const CW=SVG_W/GRID_W;   // ≈14.81
const CH=FACE_PX/GRID_H; // 13.75

const EMPTY=0,SPORE=1,SEED=2,MUSH=3,BURST=4,ACID=5;
const SPORE_TO_SEED=60,SEED_TO_MUSH=75,AUTO_BURST=265,SHOOT_BOOST=28;
const BURST_RADIUS=3,BURST_SEED=0.38,SUN_TICKS=5400;

function toSVG(face,gx,gy){
  return [gx*CW+CW/2, (face===0?FACE0_Y:FACE1_Y)+gy*CH+CH/2];
}
function mobiusWrap(face,gx,gy){
  let f=face,x=gx,y=gy;
  if(x<0)       {x+=GRID_W;f^=1;y=(GRID_H-1)-y;}
  if(x>=GRID_W) {x-=GRID_W;f^=1;y=(GRID_H-1)-y;}
  y=Math.max(0,Math.min(GRID_H-1,y));
  return{face:f,x,y};
}
function isSunlit(face,gx,gy,t){
  const lx=face===0?gx:gx+GRID_W, val=lx+gy*0.5, tot=GRID_W*2;
  const sun=(t%SUN_TICKS)/SUN_TICKS*tot;
  let d=Math.abs(val-sun); if(d>tot/2)d=tot-d;
  return d<tot/4;
}
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

function E(tag,attrs={}){
  const e=document.createElementNS(NS,tag);

  return e;
}
function clearGroup(id){const g=$(id);while(g.firstChild)g.firstChild.remove();}
function layer(type,face){return $(`L-${type}-${face===0?'top':'bot'}`);}
function place(g,sx,sy,extra){
  const base=`translate(${sx.toFixed(1)},${sy.toFixed(1)})`;
  g.setAttribute('transform',extra?`${base} ${extra}`:base);
}
function addToLayer(type,face,sprite,sx,sy,extra){
  place(sprite,sx,sy,extra); layer(type,face).appendChild(sprite);
}
const rect  =(x,y,w,h,rx,fill,m={})=>E('rect',  {x,y,width:w,height:h,rx,fill,...m});

const poly  =(pts,fill,m={})=>E('polygon',{points:pts,fill,...m});

function assetImage(name){

let audioCtx=null;
let stateSound=true, stateMusic=true, stateFX=1; // FX: 0=Low, 1=Med, 2=High

function getACtx(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function tone(freq,dur,vol=0.1,type='square',ramp=true){
  if(!stateSound) return;
  try{
    const c=getACtx(),o=c.createOscillator(),g=c.createGain();
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(vol,c.currentTime);
    if(ramp)g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);
    o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+dur);
  }catch(e){}
}
function noise(dur,vol=0.15,freq=600){
  if(!stateSound) return;
  try{
    const c=getACtx(),n=c.sampleRate*dur;
    const buf=c.createBuffer(1,n,c.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<n;d[i++]=Math.random()*2-1);
    const src=c.createBufferSource(),flt=c.createBiquadFilter(),g=c.createGain();
    src.buffer=buf;flt.type='bandpass';flt.frequency.value=freq;
    g.gain.setValueAtTime(vol,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);
    src.connect(flt);flt.connect(g);g.connect(c.destination);
    src.start();src.stop(c.currentTime+dur);
  }catch(e){}
}

// Background drone oscillator
let droneosc=null,droneGain=null;
function startBgDrone(){
  try{
    const c=getACtx();
    droneosc=c.createOscillator();
    droneGain=c.createGain();
    droneosc.type='sawtooth';droneosc.frequency.value=55;
    droneGain.gain.value=0.04;
    droneosc.connect(droneGain);droneGain.connect(c.destination);
    droneosc.start();
  }catch(e){}
}
function updateBgDrone(threatLevel){
  if(!droneosc)return;
  try{
    const c=getACtx();
    const freq=55+threatLevel*80;
    droneosc.frequency.setTargetAtTime(freq,c.currentTime,0.5);
    const vol=0.02+threatLevel*0.05;
    droneGain.gain.setTargetAtTime(vol,c.currentTime,0.5);
  }catch(e){}
}

function makePyramid(size,t){

  if(clickGX < player.x)      player.x = Math.max(0, player.x - 1);

function onKill(){
  player.streak++;
  SFX.streak(Math.min(player.streak,5));
  let pu=null;
  if(player.streak===3) {powerups.autoAim=PU_TICKS;pu='AUTO-AIM';}
  if(player.streak===6) {powerups.dblShot=PU_TICKS;pu='2× SHOT';}
  if(player.streak===10){powerups.dualCannon=PU_TICKS;pu='DUAL CANNON';}
  if(player.streak===15){powerups.tractorShield=PU_TICKS;pu='TRACTOR SHIELD';}
  if(pu){SFX.powerup();spawnPop(400,270,pu,'#ffff00');}
}
function tickPowerups(){for(const k of Object.keys(powerups)){if(powerups[k]>0)powerups[k]--;}}

// ════════════════════════════════════════════════════════════
//  AUTO-AIM
// ════════════════════════════════════════════════════════════
function applyAutoAim(){
  if(!powerups.autoAim)return;
  let bestX=-1,bestD=9999;
  for(const centi of centipedes){
    if(centi.surface!==player.aimFace)continue;
    const h=centi.segments[0];
    const d=Math.abs(h.x-player.x);
    if(d<bestD){bestD=d;bestX=h.x;}
  }
  if(bestX<0)for(const p of pyramids){
    if(p.surface!==player.aimFace)continue;
    const d=Math.abs(p.x-player.x);
    if(d<bestD){bestD=d;bestX=p.x;}
  }
  if(bestX>=0){
    if(player.x<bestX)player.x++;
    else if(player.x>bestX)player.x--;
  }
}

// ════════════════════════════════════════════════════════════

function tryFire(){
  if(player.energy<FIRE_COST||player.fireCD>0)return;
  player.energy-=FIRE_COST;player.fireCD=8;
  const face=player.aimFace,y=face===0?GRID_H-1:0,dy=face===0?-1:1;
  if(powerups.dualCannon){
    shots.push({face,x:player.x,y,dy});
    shots.push({face,x:clamp(player.x+2,0,GRID_W-1),y,dy});
    shots.push({face,x:clamp(player.x-2,0,GRID_W-1),y,dy});
    SFX.fire2();
  }else if(powerups.dblShot){
    shots.push({face,x:player.x,y,dy});
    const f2=face^1,y2=f2===0?GRID_H-1:0,dy2=f2===0?-1:1;
    shots.push({face:f2,x:player.x,y:y2,dy:dy2});
    SFX.fire2();
  }else{
    shots.push({face,x:player.x,y,dy});
    SFX.fire();
  }
  const mf=$('muzzle-flash');mf.setAttribute('r','7');mf.setAttribute('opacity','0.9');
  setTimeout(()=>{mf.setAttribute('r','0');mf.setAttribute('opacity','0');},60);
}
function tryTractor(){
  if(player.energy<TRACTOR_COST)return;
  player.energy-=TRACTOR_COST;SFX.tractorSpawn();
  const face=player.aimFace,y=face===0?GRID_H-1:0;
  tractors.push({face,x:player.x,y,target:null,t:0,cleanTimer:0,cleanedCount:0,isTurret:false});
  spawnPop(player.x*CW+CW/2,TRACK_CY,'TRACTOR','#88ff22');
}
function tryDrone(){
  if(player.energy<DRONE_COST||drones.length>=2)return;
  player.energy-=DRONE_COST;SFX.droneLaunch();
  const face=player.aimFace;
  const gy=face===0?Math.floor(GRID_H/2):Math.floor(GRID_H/2);
  drones.push({face,x:player.x,y:gy,t:0,dir:1});
  spawnPop(player.x*CW+CW/2,TRACK_CY,'DRONE','#44aaff');
}
function damagePlayer(amount){
  if(gameOver)return;
  player.shield=clamp(player.shield-amount,0,SHIELD_MAX);
  player.streak=0;SFX.hit();shakeInt=8;
  $('dmg-border').setAttribute('opacity','0.55');
  $('dmg-border').setAttribute('stroke',player.shield<25?'#ff0000':'#ff6600');
  setTimeout(()=>$('dmg-border').setAttribute('opacity','0'),320);
  if(player.shield<=0){
    player.energy=clamp(player.energy-amount*.5,0,ENERGY_MAX);
    if(player.energy<=0){gameOver=true;SFX.gameOver();stopMusic('aud-game');
      if(qualifiesForLeaderboard(player.score))setTimeout(()=>startInitialsEntry(),500);
      else saveScore(player.score,'SYS');}
  }
}
function burstMush(face,x,y){
  farm[face][y][x]={type:BURST,stage:0,t:5};SFX.explode();shakeInt=4;
  for(let yy=y-BURST_RADIUS;yy<=y+BURST_RADIUS;yy++)
    for(let xx=x-BURST_RADIUS;xx<=x+BURST_RADIUS;xx++){
      if(xx<0||xx>=GRID_W||yy<0||yy>=GRID_H)continue;
      if(rand()>BURST_SEED)continue;
      const cc=farm[face][yy][xx];
      if(cc.type===EMPTY){cc.type=SPORE;cc.t=0;}
    }
  player.energy=clamp(player.energy+2,0,ENERGY_MAX);
  player.shield=clamp(player.shield+1.5,0,SHIELD_MAX);
}
function shootCell(face,x,y){
  if(x<0||x>=GRID_W||y<0||y>=GRID_H)return false;
  const c=farm[face][y][x];
  if(c.type===MUSH){c.t+=SHOOT_BOOST;if(c.stage<3)c.stage++;else burstMush(face,x,y);player.shield=clamp(player.shield+.6,0,SHIELD_MAX);return true;}
  if(c.type===SEED){c.type=MUSH;c.stage=1;c.t=0;return true;}
  if(c.type===SPORE){c.type=SEED;c.t=0;return true;}
  return false;
}

function spawnPop(sx,sy,text,color){
  const t=E('text',{x:sx,'text-anchor':'middle',y:sy,'font-family':'Mushroom, monospace','font-size':'11','font-weight':'bold',fill:color||'#ffff00','pointer-events':'none'});
  t.textContent=text;t.classList.add('score-pop');
  $('g-score-pops').appendChild(t);
  setTimeout(()=>t.remove(),950);
}

// ════════════════════════════════════════════════════════════
//  LEVEL SYSTEM + PODS
// ════════════════════════════════════════════════════════════
function updatePods(){
  const surplus=Math.max(0,player.energy-45);
  if(surplus>0){
    for(let i=0;i<pods.length;i++){
      if(pods[i]<100){pods[i]=clamp(pods[i]+0.04*surplus,0,100);break;}
    }
  }
  for(let i=pods.length-1;i>=0;i--){
    if(pods[i]>=100){
      pods[i]=0;player.score+=250;centipedes.length=0;
      SFX.podLaunch();SFX.bigExplode();shakeInt=10;
      podsThisLevel++;
      spawnPop(400,200,`+250  POD LAUNCHED!`,'#00ffff');
      if(podsThisLevel>=getPodsRequired(level)){
        SFX.levelComplete();
        setTimeout(()=>startMobiusTransition(),800);
      }
      break;
    }
  }
}

// ════════════════════════════════════════════════════════════
//  MÖBIUS LEVEL TRANSITION
// ════════════════════════════════════════════════════════════
function startMobiusTransition(){
  if(inTransition)return;
  inTransition=true;levelWaiting=true;
  const fieldEl=$('g-field');
  const flashEl=$('transition-flash');
  
  // Trigger CSS twist animation
  fieldEl.style.transformOrigin = '400px 280px';
  fieldEl.classList.add('mobius-twist');
  
  // Flash fade sequence
  flashEl.style.transition = 'opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
  flashEl.setAttribute('opacity', '0.4');

  // Mid-point (flip contents)
  setTimeout(()=>{
    const oldTrack = level%2===0 ? 'aud-game-even' : 'aud-game-odd';
    stopMusic(oldTrack);
    level++;podsThisLevel=0;
    const newTrack = level%2===0 ? 'aud-game-even' : 'aud-game-odd';
    playMusic(newTrack);
    centipedes.length=0;pyramids.length=0;shots.length=0;enemyShots.length=0;
    nextCenti=tick+60;nextPyramid=tick+30;
    player.energy=clamp(player.energy+25,0,ENERGY_MAX);
    // Announce
    $('lvl-title').textContent=`LEVEL ${level}`;
    $('lvl-sub').textContent=`TARGET: ${getPodsRequired(level)} PODS`;
    $('g-level-announce').removeAttribute('display');
    $('g-level-announce').classList.add('level-in');
    
    // Flash out
    flashEl.setAttribute('opacity','0');
  }, 600);

  // End animation
  setTimeout(()=>{
    $('g-level-announce').setAttribute('display','none');
    $('g-level-announce').classList.remove('level-in');
    fieldEl.classList.remove('mobius-twist');
    inTransition=false;levelWaiting=false;
  }, 1200);
}

// ════════════════════════════════════════════════════════════
//  UPDATE: FARM
// ════════════════════════════════════════════════════════════
function updateFarm(){
  for(let s=0;s<2;s++)for(let y=0;y<GRID_H;y++)for(let x=0;x<GRID_W;x++){
    const c=farm[s][y][x],lit=isSunlit(s,x,y,tick),frozen=!lit&&rand()>.05;
    if(c.type===SPORE){if(!frozen)c.t++;if(c.t>=SPORE_TO_SEED){c.type=SEED;c.t=0;}}
    else if(c.type===SEED){if(!frozen)c.t++;if(c.t>=SEED_TO_MUSH){c.type=MUSH;c.stage=1;c.t=0;}}
    else if(c.type===MUSH){
      if(!frozen)c.t++;player.energy=clamp(player.energy+.004*c.stage,0,ENERGY_MAX);
      if(c.t>=AUTO_BURST)burstMush(s,x,y);
      else if(!frozen&&c.stage<3&&c.t%120===0&&rand()<.35)c.stage++;
    }else if(c.type===BURST){c.t--;if(c.t<=0){c.type=EMPTY;c.stage=0;c.t=0;}}
  }
}

// ════════════════════════════════════════════════════════════
//  UPDATE: SHOTS
// ════════════════════════════════════════════════════════════
function updateShots(){
  for(let i=shots.length-1;i>=0;i--){
    const sh=shots[i];sh.y+=sh.dy;
    if(sh.y<0||sh.y>=GRID_H){shots.splice(i,1);continue;}
    let hit=false;
    for(let k=centipedes.length-1;k>=0&&!hit;k--){
      const centi=centipedes[k];if(centi.surface!==sh.face)continue;
      for(let j=centi.segments.length-1;j>=0;j--){
        const seg=centi.segments[j];if(seg.x!==sh.x||seg.y!==sh.y)continue;
        const pts=j===0?50:10;player.score+=pts;
        const[sx,sy]=toSVG(sh.face,sh.x,sh.y);spawnPop(sx,sy-12,`+${pts}`,'#ffff00');
        player.energy=clamp(player.energy+.8,0,ENERGY_MAX);
        centi.segments.splice(j,1);
        if(centi.segments.length===0){centipedes.splice(k,1);SFX.bigExplode();shakeInt=5;}
        else SFX.explode();
        onKill();hit=true;break;
      }
    }
    if(!hit)for(let j=pyramids.length-1;j>=0;j--){
      const p=pyramids[j];if(p.surface!==sh.face||p.x!==sh.x||p.y!==sh.y)continue;
      pyramids.splice(j,1);player.score+=20;
      const[sx,sy]=toSVG(sh.face,sh.x,sh.y);spawnPop(sx,sy-12,'+20','#cc66ff');
      player.energy=clamp(player.energy+1.5,0,ENERGY_MAX);SFX.explode();onKill();hit=true;break;
    }
    if(!hit)for(let j=tractors.length-1;j>=0;j--){
      const t=tractors[j];if(t.face===sh.face&&t.x===sh.x&&t.y===sh.y){tractors.splice(j,1);hit=true;break;}
    }
    if(!hit)for(let j=turrets.length-1;j>=0;j--){
      const t=turrets[j];if(t.face===sh.face&&t.x===sh.x&&t.y===sh.y){
        turrets.splice(j,1);SFX.explode();hit=true;break; // friendly fire kills turret
      }
    }
    if(!hit&&shootCell(sh.face,sh.x,sh.y))hit=true;
    if(hit)shots.splice(i,1);
  }

  for(let i=enemyShots.length-1;i>=0;i--){
    const e=enemyShots[i];e.y+=e.dy;
    if(e.y<0||e.y>=GRID_H){enemyShots.splice(i,1);continue;}
    if(e.x>=0&&e.x<GRID_W){const c=farm[e.face][e.y][e.x];if(c.type!==BURST&&c.type!==ACID){c.type=ACID;c.stage=0;c.t=0;}}
    let hit=false;
    // Tractor shield blocks shots
    if(powerups.tractorShield)for(const t of tractors){
      if(t.face===e.face&&Math.abs(t.x-e.x)<=3&&Math.abs(t.y-e.y)<=2){hit=true;break;}
    }
    // Turrets also block shots
    if(!hit)for(const t of turrets){
      if(t.face===e.face&&Math.abs(t.x-e.x)<=2&&Math.abs(t.y-e.y)<=2){t.hp-=5;if(t.hp<=0){const idx=turrets.indexOf(t);if(idx>=0)turrets.splice(idx,1);}hit=true;break;}
    }
    const edgeY=e.face===0?GRID_H-1:0;
    if(!hit&&e.y===edgeY&&Math.abs(e.x-player.x)<=2){damagePlayer(10);hit=true;}
    if(hit)enemyShots.splice(i,1);
  }
}

// ════════════════════════════════════════════════════════════
//  UPDATE: CENTIPEDES (with split on player hit)
// ════════════════════════════════════════════════════════════
function spawnCentipedeAt(surface,x,y,len,stepMax,ignoreCap){
  if(!ignoreCap&&centipedes.length>=8)return;
  const segs=Array.from({length:Math.max(2,len)},(_,i)=>({x:(x-i+GRID_W)%GRID_W,y}));
  centipedes.push({surface,segments:segs,stepTick:0,stepMax:stepMax||CENTI_STEP,dir:rand()<.5?1:-1,grace:30});
}
function spawnCentipede(surface){
  if(centipedes.length>=6)return;
  const s=surface!==undefined?surface:randi(2);
  const startY=s===0?0:GRID_H-1;
  spawnCentipedeAt(s,randi(GRID_W),startY,CENTI_LEN,CENTI_STEP,false);
}

function updateCentipedes(){
  let nearTrack=false;
  for(const centi of centipedes){
    const h=centi.segments[0];
    const ey=centi.surface===0?GRID_H-1:0;
    if(Math.abs(h.y-ey)<=3)nearTrack=true;
  }
  if(nearTrack&&tick%20===0)SFX.centiStep();

  for(let k=centipedes.length-1;k>=0;k--){
    const centi=centipedes[k];
    if(centi.grace>0)centi.grace--;
    centi.stepTick++;
    if(centi.stepTick<(centi.stepMax||CENTI_STEP))continue;
    centi.stepTick=0;
    if(centi.surface===undefined)continue;

    // Play step sound per centi occasionally
    if(tick%((centi.stepMax||CENTI_STEP)*4)===0)SFX.centiStep();

    const head=centi.segments[0];
    let target=null,bestD=9999;
    for(let y=0;y<GRID_H;y++)for(let x=0;x<GRID_W;x++){
      if(farm[centi.surface][y][x].type===MUSH){
        const d=Math.abs(x-head.x)+Math.abs(y-head.y);
        if(d<bestD){bestD=d;target={x,y};}
      }
    }
    let nx=head.x+centi.dir,ny=head.y;
    if(target&&rand()<.75){
      const dx=Math.sign(target.x-head.x),dy=Math.sign(target.y-head.y);
      if(rand()<.7){centi.dir=dx||centi.dir;nx=head.x+centi.dir;}
      else{nx=head.x;ny=head.y+dy;}
    }else if(rand()<.12){centi.dir*=-1;nx=head.x+centi.dir;}

    ny=clamp(ny,0,GRID_H-1);
    const w=mobiusWrap(centi.surface,nx,ny);
    centi.surface=w.face;nx=w.x;ny=w.y;
    centi.segments.unshift({x:nx,y:ny});centi.segments.pop();

    const c=farm[centi.surface][ny][nx];
    if(c.type===SPORE||c.type===SEED){c.type=EMPTY;c.stage=0;c.t=0;}
    else if(c.type===MUSH&&rand()<.55){if(c.stage>1)c.stage--;else{c.type=SPORE;c.stage=0;c.t=0;}}

    // Edge collision → SPLIT into two faster ones
    const edgeY=centi.surface===0?GRID_H-1:0;
    if(centi.grace<=0&&ny===edgeY&&Math.abs(nx-player.x)<=1){
      damagePlayer(15);
      const curSpeed=centi.stepMax||CENTI_STEP;
      const newSpeed=Math.max(1,Math.floor(curSpeed*.8));
      const half=Math.max(2,Math.floor(centi.segments.length/2));
      centipedes.splice(k,1);
      spawnCentipedeAt(centi.surface,nx,ny,half,newSpeed,true);
      spawnCentipedeAt(centi.surface,nx,ny,half,newSpeed,true);
      SFX.bigExplode();shakeInt=6;
    }
  }
}

// ════════════════════════════════════════════════════════════
//  UPDATE: PYRAMIDS (with hive mitosis)
// ════════════════════════════════════════════════════════════
function updatePyramids(){
  for(let i=pyramids.length-1;i>=0;i--){
    const p=pyramids[i];p.t++;
    if(p.t%10===0){
      p.x+=p.dx;p.y+=p.dy;
      if(p.y<0){p.y=0;p.dy=1;}if(p.y>=GRID_H){p.y=GRID_H-1;p.dy=-1;}
      const w=mobiusWrap(p.surface,p.x,p.y);p.surface=w.face;p.x=w.x;p.y=w.y;
    }
    if(p.t%300===0&&p.size<8)p.size++;

    // Hive mitosis (from original source)
    if(p.size>=8){
      if(centipedes.length<6){
        p.size-=4;
        spawnCentipedeAt(p.surface,p.x,p.y,CENTI_LEN,Math.max(1,CENTI_STEP-1),false);
        SFX.tractorSpawn();
      }else if(pyramids.length<12){
        // Mitosis: split into 2
        const sz=4;
        pyramids.splice(i,1);
        pyramids.push({surface:p.surface,x:p.x,y:p.y,dx:1,dy:-1,t:0,size:sz});
        pyramids.push({surface:p.surface,x:p.x,y:p.y,dx:-1,dy:1,t:0,size:sz});
        SFX.explode();continue;
      }
    }

    if(p.t%40===0)enemyShots.push({face:p.surface,x:p.x,y:p.y,dy:p.surface===0?1:-1});

    const c=farm[p.surface][p.y][p.x];
    if(c.type===MUSH){p.size++;c.type=ACID;c.stage=0;c.t=0;}
    else if(c.type===EMPTY){c.type=ACID;c.stage=0;c.t=0;}

    if(!isSunlit(p.surface,p.x,p.y,tick)&&pyramids.length<14&&rand()<.002)
      pyramids.push({surface:p.surface,x:p.x,y:p.y,dx:rand()<.5?-1:1,dy:rand()<.5?-1:1,t:0,size:1});
  }
}

// ════════════════════════════════════════════════════════════
//  UPDATE: TRACTORS → auto-upgrade to TURRET
// ════════════════════════════════════════════════════════════
function updateTractors(){
  for(let i=tractors.length-1;i>=0;i--){
    const t=tractors[i];
    if(t.isTurret)continue; // managed separately
    t.t++;
    if(t.cleanTimer>0){
      t.cleanTimer--;
      if(t.cleanTimer===0){
        const c=farm[t.face][t.y]?.[t.x];
        if(c&&c.type===ACID){c.type=EMPTY;player.score+=5;t.cleanedCount=(t.cleanedCount||0)+1;}
        t.target=null;
      }
      continue;
    }
    if(!t.target||farm[t.face][t.target.y]?.[t.target.x]?.type!==ACID){
      t.target=null;
      let best=null,bestD=9999;
      for(let y=0;y<GRID_H;y++)for(let x=0;x<GRID_W;x++){
        if(farm[t.face][y][x].type===ACID){
          const d=Math.abs(x-t.x)+Math.abs(y-t.y);
          if(d<bestD){bestD=d;best={x,y};}
        }
      }
      t.target=best;
    }
    if(t.target){
      if(t.t%4===0){
        const dx=Math.sign(t.target.x-t.x),dy=Math.sign(t.target.y-t.y);
        if(dx!==0)t.x=(t.x+dx+GRID_W)%GRID_W;
        else if(dy!==0)t.y=clamp(t.y+dy,0,GRID_H-1);
      }
      if(t.x===t.target.x&&t.y===t.target.y&&farm[t.face][t.y][t.x].type===ACID)t.cleanTimer=15;
    }else if(t.t>80&&(t.cleanedCount||0)>=3){
      // Upgrade to turret!
      const turretCount=turrets.filter(tr=>tr.face===t.face).length;
      if(turretCount<3){
        turrets.push({face:t.face,x:t.x,y:t.y,hp:50,fireCd:0});
        tractors.splice(i,1);SFX.turretBuild();
        spawnPop(...toSVG(t.face,t.x,t.y),'TURRET BUILT!','#ffff44');
      }else if(t.t>300){tractors.splice(i,1);}
    }else if(t.t>300){tractors.splice(i,1);}
  }
}

// ════════════════════════════════════════════════════════════
//  UPDATE: TURRETS (auto-fire at enemies)
// ════════════════════════════════════════════════════════════
function updateTurrets(){
  for(let i=turrets.length-1;i>=0;i--){
    const t=turrets[i];
    if(t.hp<=0){turrets.splice(i,1);continue;}
    t.fireCd=(t.fireCd||0)+1;
    if(t.fireCd<25)continue;
    // Find nearest enemy on same face
    let best=null,bestD=9999;
    for(const centi of centipedes){
      if(centi.surface!==t.face)continue;
      const h=centi.segments[0];
      const d=Math.abs(h.x-t.x)+Math.abs(h.y-t.y);
      if(d<bestD&&d<18){bestD=d;best={x:h.x,y:h.y,type:'centi_head',ref:centi};}
    }
    for(const p of pyramids){
      if(p.surface!==t.face)continue;
      const d=Math.abs(p.x-t.x)+Math.abs(p.y-t.y);
      if(d<bestD&&d<18){bestD=d;best={x:p.x,y:p.y,type:'pyramid',ref:p};}
    }
    if(best){
      t.fireCd=0;SFX.turretFire();
      // Instant hit (turret fires too accurately to miss)
      if(best.type==='centi_head'){
        const idx=centipedes.indexOf(best.ref);
        if(idx>=0){centipedes[idx].segments.shift();if(!centipedes[idx].segments.length)centipedes.splice(idx,1);}
        player.score+=12;const[sx,sy]=toSVG(t.face,t.x,t.y);spawnPop(sx,sy-12,'+12','#ffaa00');
      }else{
        const idx=pyramids.indexOf(best.ref);
        if(idx>=0)pyramids.splice(idx,1);
        player.score+=15;const[sx,sy]=toSVG(t.face,t.x,t.y);spawnPop(sx,sy-12,'+15','#cc66ff');
      }
    }
  }
}

// ════════════════════════════════════════════════════════════
//  UPDATE: DRONES
// ════════════════════════════════════════════════════════════
function updateDrones(){
  for(let i=drones.length-1;i>=0;i--){
    const d=drones[i];d.t++;
    if(d.t%3!==0)continue;
    d.x+=d.dir;
    if(d.x<0||d.x>=GRID_W){drones.splice(i,1);continue;}
    // Spray insecticide: clean acid in radius 1
    for(let yy=d.y-1;yy<=d.y+1;yy++)for(let xx=d.x-1;xx<=d.x+1;xx++){
      if(xx<0||xx>=GRID_W||yy<0||yy>=GRID_H)continue;
      const c=farm[d.face][yy][xx];
      if(c.type===ACID){c.type=EMPTY;c.stage=0;c.t=0;player.score+=2;}
    }
    // Damage centipedes in path
    for(let k=centipedes.length-1;k>=0;k--){
      const centi=centipedes[k];if(centi.surface!==d.face)continue;
      const h=centi.segments[0];
      if(Math.abs(h.x-d.x)<=1&&Math.abs(h.y-d.y)<=1){
        centi.segments.shift();if(!centi.segments.length){centipedes.splice(k,1);SFX.explode();}
        player.score+=15;onKill();
        const[sx,sy]=toSVG(d.face,d.x,d.y);spawnPop(sx,sy-12,'INSECTICIDE!','#88ffcc');
      }
    }
  }
}

function spawnPyramid(){
  if(pyramids.length>=10)return;
  const s=randi(2);
  pyramids.push({surface:s,x:randi(GRID_W),y:randi(GRID_H),dx:rand()<.5?-1:1,dy:rand()<.5?-1:1,t:0,size:1});
}

// ════════════════════════════════════════════════════════════
//  MAIN UPDATE
// ════════════════════════════════════════════════════════════
function update(){
  if(!running)return;

  // Initials entry intercepts everything
  if(enteringInitials){
    if(consume('ArrowUp')||consume('KeyW')){
      const idx=LETTERS.indexOf(initChars[initCursor]);
      initChars[initCursor]=LETTERS[(idx+1)%LETTERS.length];
      updateInitialsDisplay();
    }
    if(consume('ArrowDown')||consume('KeyS')){
      const idx=LETTERS.indexOf(initChars[initCursor]);
      initChars[initCursor]=LETTERS[(idx+LETTERS.length-1)%LETTERS.length];
      updateInitialsDisplay();
    }
    if(consume('ArrowRight')||consume('Enter')||consume('NumpadEnter')){
      initCursor++;
      if(initCursor>=3)confirmInitials();
      else updateInitialsDisplay();
    }
    if(consume('ArrowLeft')&&initCursor>0){initCursor--;updateInitialsDisplay();}
    return;
  }

  if(gameOver){if(consume('KeyR'))reset();return;}
  if(paused){if(consume('Escape')||consume('KeyP')){paused=false;$('btn-pause-icon').setAttribute('d','M643 523h2v10h-2zm5 0h2v10h-2z');}return;}
  if(levelWaiting||inTransition){keysFired.clear();return;}

  tick++;

  // ── Keyboard ──
  if(keysHeld.has('ArrowLeft')||keysHeld.has('KeyA'))player.x=(player.x-1+GRID_W)%GRID_W;
  if(keysHeld.has('ArrowRight')||keysHeld.has('KeyD'))player.x=(player.x+1)%GRID_W;
  if(consume('Space'))player.aimFace^=1;
  if(consume('Enter')||consume('NumpadEnter'))tryFire();
  if(consume('KeyR'))tryTractor();
  if(consume('KeyE'))tryDrone();
  if(consume('Escape')||consume('KeyP')){
    paused=true;
    $('btn-pause-icon').setAttribute('d','M643 523l8 5l-8 5z');
  }
  if(player.fireCD>0)player.fireCD--;

  // ── Mouse horizontal ──
  if(mouseX>=0){
    const targetX=clamp(Math.floor(mouseX/CW),0,GRID_W-1);
    if(player.x<targetX)player.x++;
    else if(player.x>targetX)player.x--;
  }

  // ── Gyro ──
  if(gyroActive){
    const tilt=clamp(gyroGamma/45,-1,1);
    const targetX=Math.round((tilt+1)/2*(GRID_W-1));
    if(tick%2===0){if(player.x<targetX)player.x++;else if(player.x>targetX)player.x--;}
    if(gyroBeta>20)player.aimFace=0;
    else if(gyroBeta<-5)player.aimFace=1;
  }

  // ── Auto-aim ──
  applyAutoAim();

  // ── Wheel rotation ──
  const dx=player.x-prevPlayerX;
  if(Math.abs(dx)<=1)wheelAngle+=dx*18;
  else if(dx>1)wheelAngle+=18;
  else if(dx<-1)wheelAngle-=18;
  prevPlayerX=player.x;

  // ── Screen shake decay ──
  if(shakeInt>0){
    const shakeMult = stateFX===2 ? 1.5 : stateFX===1 ? 0.75 : 0.15;
    shakeX=(Math.random()-.5)*shakeInt*2*shakeMult;
    shakeY=(Math.random()-.5)*shakeInt*2*shakeMult;
    shakeInt=Math.max(0,shakeInt-.7);
  }else{shakeX=0;shakeY=0;}

  // ── Economy ──
  player.energy=clamp(player.energy+ENERGY_REGEN,0,ENERGY_MAX);
  if(player.shield<SHIELD_MAX&&player.energy>0){
    player.shield=clamp(player.shield+SHIELD_REGEN,0,SHIELD_MAX);
    player.energy=clamp(player.energy-SHIELD_REGEN*.18,0,ENERGY_MAX);
  }

  // ── Threat level for bg drone ──
  const threat=clamp((centipedes.length+pyramids.length*0.5)/10,0,1);
  updateBgDrone(threat);

  // ── Power-ups + Pods ──
  tickPowerups();
  updatePods();

  // ── Farm + entities ──
  updateFarm();
  if(tick>=nextCenti){spawnCentipede();nextCenti=tick+240+randi(120);}
  if(tick>=nextPyramid){spawnPyramid();nextPyramid=tick+180+randi(80);}
  updateShots();
  updateCentipedes();
  updatePyramids();
  updateTractors();
  updateTurrets();
  updateDrones();
}

// ════════════════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════════════════
function renderFarm(){
  clearGroup('L-mush-top');clearGroup('L-mush-bot');
  for(let s=0;s<2;s++)for(let y=0;y<GRID_H;y++)for(let x=0;x<GRID_W;x++){
    const c=farm[s][y][x];if(c.type===EMPTY)continue;
    const[sx,sy]=toSVG(s,x,y),lit=isSunlit(s,x,y,tick);
    let sp;
    switch(c.type){
      case SPORE:sp=makeSpore();break;case SEED:sp=makeSeed();break;
      case MUSH:sp=makeMush(c.stage,lit);break;
      case BURST:sp=makeBurst();break;case ACID:sp=makeAcid();break;
    }
    if(sp){
      if(!lit&&c.type!==BURST&&c.type!==MUSH)sp.setAttribute('opacity','.35');
      addToLayer('mush',s,sp,sx,sy);
    }
  }
}

function renderAgents(){
  clearGroup('L-agents-top');clearGroup('L-agents-bot');

  let autoTarget=null;
  if(powerups.autoAim){
    let bestD=9999;
    for(const centi of centipedes){
      if(centi.surface!==player.aimFace)continue;
      const h=centi.segments[0],d=Math.abs(h.x-player.x);
      if(d<bestD){bestD=d;autoTarget={face:centi.surface,...h};}
    }
  }

  for(const centi of centipedes)for(let i=centi.segments.length-1;i>=0;i--){
    const seg=centi.segments[i];
    const[sx,sy]=toSVG(centi.surface,seg.x,seg.y);
    const isH=i===0,isTgt=isH&&autoTarget&&autoTarget.face===centi.surface&&autoTarget.x===seg.x&&autoTarget.y===seg.y;
    addToLayer('agents',centi.surface,isH?makeCentiHead(isTgt):makeCentiSeg(),sx,sy);
  }

  for(const p of pyramids){
    const[sx,sy]=toSVG(p.surface,p.x,p.y);addToLayer('agents',p.surface,makePyramid(p.size,tick),sx,sy);
  }

  for(const t of tractors){
    const[sx,sy]=toSVG(t.face,t.x,t.y);
    const blinking=t.cleanTimer>0&&tick%6<3;
    addToLayer('agents',t.face,powerups.tractorShield?makeShieldTractor():makeTractor(blinking),sx,sy);
  }

  for(const t of turrets){
    const[sx,sy]=toSVG(t.face,t.x,t.y);addToLayer('agents',t.face,makeTurret(),sx,sy);
  }

  for(const d of drones){
    const[sx,sy]=toSVG(d.face,d.x,d.y);
    const extra=d.dir===-1?'scale(-1,1)':'';
    addToLayer('agents',d.face,makeDrone(),sx,sy,extra);
    // Spray particles
    if(tick%3===0)addToLayer('agents',d.face,makeInsecticideSpray(),sx,sy);
  }
}

function renderBullets(){
  clearGroup('L-bullets-top');clearGroup('L-bullets-bot');
  for(const sh of shots){
    const[sx,sy]=toSVG(sh.face,sh.x,sh.y);
    addToLayer('bullets',sh.face,makeBullet(),sx,sy,sh.face===1?'rotate(180)':'');
  }
  for(const e of enemyShots){
    const[sx,sy]=toSVG(e.face,e.x,e.y);addToLayer('bullets',e.face,makeEnemyShot(),sx,sy);
  }
}

function renderTrain(){
  // Check if external assets loaded
  const imgTrain=$('img-train'),trainProc=$('g-train-proc');
  if(loadedAssets['train']){imgTrain.setAttribute('visibility','visible');trainProc.setAttribute('display','none');}
  else{imgTrain.setAttribute('visibility','hidden');trainProc.removeAttribute('display');}

  const imgCannon=$('img-cannon'),cannonProc=$('g-cannon-proc');
  if(loadedAssets['cannon']){imgCannon.setAttribute('visibility','visible');cannonProc.setAttribute('display','none');}
  else{imgCannon.setAttribute('visibility','hidden');cannonProc.removeAttribute('display');}

  const sx=player.x*CW+CW/2;
  let trainTransform=`translate(${sx.toFixed(1)},${TRACK_CY})`;
  if(shakeInt>0)trainTransform=`translate(${(sx+shakeX).toFixed(1)},${(TRACK_CY+shakeY).toFixed(1)})`;
  $('g-train').setAttribute('transform',trainTransform);

  // Also shake the field
  if(shakeInt>0)$('g-field').setAttribute('transform',
    `translate(${shakeX.toFixed(1)},${shakeY.toFixed(1)})`);
  else $('g-field').removeAttribute('transform');

  $('g-cannon').setAttribute('transform',`rotate(${player.aimFace===0?0:180},0,-15)`);
  $('g-cannon-dual')[powerups.dualCannon?'removeAttribute':'setAttribute']('display','none');

  // Wheel rotation
  const wr=`rotate(${(wheelAngle%360).toFixed(1)})`;
  $('wheel-l').setAttribute('transform',`translate(-30,14) ${wr}`);
  $('wheel-c').setAttribute('transform',`translate(0,14) ${wr}`);
  $('wheel-r').setAttribute('transform',`translate(30,14) ${wr}`);

  // Parallax stars
  const parallax=(player.x/GRID_W-.5)*20;
  $('g-stars-top').setAttribute('transform',`translateX(${(-parallax).toFixed(1)})`);
  $('g-stars-bot').setAttribute('transform',`translateX(${(parallax*.6).toFixed(1)})`);

  const aim=$('hud-aim');
  if(player.aimFace===0){aim.textContent='▲ UPPER';aim.setAttribute('fill','#00ccff');}
  else{aim.textContent='▼ LOWER';aim.setAttribute('fill','#ff8800');}
}

function renderHUD(){
  $('hud-score').textContent=`SCORE ${String(player.score).padStart(6,'0')}`;
  $('hud-hi').textContent=`HI ${String(Math.max(player.score,getHiScore())).padStart(6,'0')}`;

  const ep=player.energy/ENERGY_MAX;
  $('hud-e-bar').setAttribute('width',String((ep*58).toFixed(1)));
  $('hud-e-bar').setAttribute('fill',ep<.2?'#882200':'#007744');
  const sp=player.shield/SHIELD_MAX;
  $('hud-s-bar').setAttribute('width',String((sp*58).toFixed(1)));
  $('hud-s-bar').setAttribute('fill',sp<.25?'#aa1100':sp<.5?'#aa6600':'#2244aa');

  const st=$('hud-streak');st.textContent=`✕${player.streak}`;
  st.setAttribute('fill',player.streak>=10?'#ff2200':player.streak>=5?'#ff8800':'#ff5500');

  let filled=0;
  for(let s=0;s<2;s++)for(let y=0;y<GRID_H;y++)for(let x=0;x<GRID_W;x++)
    if(farm[s][y][x].type!==EMPTY)filled++;
  const d=filled/(2*GRID_W*GRID_H);
  $('hud-density').textContent=`FARM${'█'.repeat(Math.round(d*8))}${'░'.repeat(8-Math.round(d*8))}`;

  $('hud-level').textContent=`LVL ${level}`;
  const podStr=pods.map(p=>p>=66?'#':p>=33?'+':p>0?'.':'-').join('');
  $('hud-pods').textContent=`PODS:[${podStr}] ${podsThisLevel}/${getPodsRequired(level)}`;

  // Power-up bars
  const puDefs=[
    ['auto',powerups.autoAim,'#00ff44','#002a00','#44aa44',46],
    ['dshot',powerups.dblShot,'#ff8800','#2a1500','#aa6622',46],
    ['dual',powerups.dualCannon,'#ff2200','#2a0000','#aa2200',54],
    ['tshld',powerups.tractorShield,'#4488ff','#00001a','#2244aa',58],
  ];
  for(const[key,ticks,col,bgOff,txtOff,maxW]of puDefs){
    const bar=$(`pu-bar-${key}`),txt=$(`pu-txt-${key}`),bg=$(`pu-bg-${key}`);
    bar.setAttribute('width',String(Math.round(ticks/PU_TICKS*maxW)));
    bar.setAttribute('fill',col);
    if(ticks>0){
      bg.setAttribute('fill',`${col}18`);
      txt.setAttribute('fill',col);
      txt.classList.add('pu-on');
    }else{
      bg.setAttribute('fill',bgOff);
      txt.setAttribute('fill',txtOff);
      txt.classList.remove('pu-on');
    }
  }

  if(paused&&!$('g-paused')){
    const g=E('g',{id:'g-paused'});
    g.appendChild(E('rect',{x:'295',y:'256',width:'210',height:'32',rx:'5',fill:'#000',stroke:'#00ff88','stroke-width':'1.5'}));
    const t=E('text',{x:'400',y:'278','text-anchor':'middle',fill:'#00ff88','font-family':'Mushroom, monospace','font-size':'14','font-weight':'bold'});
    t.textContent='PAUSED [ESC]';g.appendChild(t);$('game').appendChild(g);
  }else if(!paused)$('g-paused')?.remove();

  if(gameOver&&!$('g-gameover')){
    const g=E('g',{id:'g-gameover'});
    g.appendChild(E('rect',{x:'198',y:'198',width:'404',height:'148',rx:'10',fill:'#000',stroke:'#ff2222','stroke-width':'2.5'}));
    const t1=E('text',{x:'400',y:'248','text-anchor':'middle',fill:'#ff2222','font-family':'Mushroom, monospace','font-size':'30','font-weight':'bold'}); t1.textContent='GAME OVER';
    const t2=E('text',{x:'400',y:'278','text-anchor':'middle',fill:'#ffff00','font-family':'Mushroom, monospace','font-size':'14'}); t2.textContent=`FINAL SCORE: ${player.score}`;
    const t3=E('text',{x:'400',y:'330','text-anchor':'middle',fill:'#555','font-family':'Mushroom, monospace','font-size':'11'}); t3.textContent='PRESS R TO RESTART';t3.classList.add('blink');
    g.append(t1,t2,t3);$('game').appendChild(g);
  }
}

function render(){
  renderFarm();renderAgents();renderBullets();renderTrain();renderHUD();
}

// ════════════════════════════════════════════════════════════
//  MAIN LOOP
// ════════════════════════════════════════════════════════════
// ════════════════════════════════════════════════════════════
//  TITLE SCREEN: PERIMETER CENTIPEDE + PANEL CAROUSEL
// ════════════════════════════════════════════════════════════
const CENTI_PARTS=11,CENTI_SPACING=22,CENTI_LOOP_S=12;
const PERI=[[400,50],[770,50],[770,490],[30,490],[30,50],[400,50]];
let periLen=[],periTotal=0;
(function(){
  for(let i=0;i<PERI.length-1;i++){
    const dx=PERI[i+1][0]-PERI[i][0],dy=PERI[i+1][1]-PERI[i][1];
    const l=Math.sqrt(dx*dx+dy*dy);periLen.push(l);periTotal+=l;
  }
})();
function periPos(t){
  t=((t%1)+1)%1;
  let d=t*periTotal;
  for(let i=0;i<periLen.length;i++){
    if(d<=periLen[i]){
      const f=d/periLen[i];
      return{x:PERI[i][0]+(PERI[i+1][0]-PERI[i][0])*f,
             y:PERI[i][1]+(PERI[i+1][1]-PERI[i][1])*f,
             a:Math.atan2(PERI[i+1][1]-PERI[i][1],PERI[i+1][0]-PERI[i][0])};
    }
    d-=periLen[i];
  }
  return{x:400,y:50,a:0};
}
function animateCentipede(now){
  const t=now/1000/CENTI_LOOP_S;
  for(let i=0;i<CENTI_PARTS;i++){
    const st=t-(i*CENTI_SPACING/periTotal);
    const p=periPos(st);
    const und=Math.sin(now/1000*4+i*0.8)*5;
    const px=p.x+(-Math.sin(p.a))*und;
    const py=p.y+Math.cos(p.a)*und;
    const deg=p.a*180/Math.PI;
    // Fade near logo center (400,67)
    const ldx=px-400,ldy=py-67;
    const ld=Math.sqrt(ldx*ldx+ldy*ldy);
    const op=Math.min(1,Math.max(0,(ld-40)/60));
    const el=$(i===0?'cp-0':'cp-'+i);
    if(el){
      el.setAttribute('transform',`translate(${px.toFixed(1)},${py.toFixed(1)}) rotate(${deg.toFixed(1)})`);
      el.setAttribute('opacity',op.toFixed(2));
    }
  }
}

// Panel carousel
const PANELS=['panel-scores','panel-instructions','panel-start'];
let curPanel=0,panelTimer=null;
function showPanel(idx){
  PANELS.forEach((id,i)=>{
    const el=$(id);
    if(i===idx){el.style.opacity='1';el.style.pointerEvents='auto';}
    else{el.style.opacity='0';el.style.pointerEvents='none';}
  });
  curPanel=idx;
}
function startPanelCycling(){
  if(panelTimer)clearInterval(panelTimer);
  curPanel=0;showPanel(0);
  panelTimer=setInterval(()=>{curPanel=(curPanel+1)%PANELS.length;showPanel(curPanel);},4000);
}
function stopPanelCycling(){
  if(panelTimer){clearInterval(panelTimer);panelTimer=null;}
}

function startGame(){
  stopPanelCycling();
  $('g-overlay').style.display='none';
  initStars();initSleepers();preloadAssets();
  reset();running=true;
  startBgDrone();
  stopMusic('aud-title');playMusic('aud-game-odd');
  if('ontouchstart' in window||navigator.maxTouchPoints>0){
    $('g-tractor-btn').removeAttribute('display');
    $('g-drone-btn').removeAttribute('display');
    requestGyro();
  }
}

$('btn-start').addEventListener('click',startGame);
$('btn-start').addEventListener('touchend',e=>{e.preventDefault();startGame();});
$('btn-pause').addEventListener('click',()=>{
  if(!running||gameOver)return;
  paused=!paused;
  $('btn-pause-icon').setAttribute('d', paused ? 'M643 523l8 5l-8 5z' : 'M643 523h2v10h-2zm5 0h2v10h-2z');
});
$('btn-pause').addEventListener('touchend',e=>{
  e.preventDefault();
  if(!running||gameOver)return;
  paused=!paused;
  $('btn-pause-icon').setAttribute('d', paused ? 'M643 523l8 5l-8 5z' : 'M643 523h2v10h-2zm5 0h2v10h-2z');
});

// Settings Panel interactions
$('g-settings-btn').addEventListener('click', () => {
  const p = $('g-settings-panel');
  p.setAttribute('display', p.getAttribute('display') === 'none' ? 'inline' : 'none');
});
$('btn-set-sound').addEventListener('click', () => {
  stateSound = !stateSound;
  $('txt-set-sound').textContent = 'SOUND: ' + (stateSound ? 'ON' : 'OFF');
});
$('btn-set-music').addEventListener('click', () => {
  stateMusic = !stateMusic;
  $('txt-set-music').textContent = 'MUSIC: ' + (stateMusic ? 'ON' : 'OFF');
  if(!stateMusic){
    stopMusic('aud-title');
    stopMusic('aud-game-even');
    stopMusic('aud-game-odd');
  } else {
    if(running) playMusic(level%2===0 ? 'aud-game-even' : 'aud-game-odd');
    else playMusic('aud-title');
  }
});
$('btn-set-fx').addEventListener('click', () => {
  stateFX = (stateFX + 1) % 3;
  const labels = ['LOW', 'MEDIUM', 'HIGH'];
  $('txt-set-fx').textContent = 'FX (SHAKE): ' + labels[stateFX];
});
$('btn-set-close').addEventListener('click', () => {
  $('g-settings-panel').setAttribute('display', 'none');
});
window.addEventListener('keydown',e=>{
  if(e.code==='Enter'&&!running){try{getACtx();}catch{}startGame();}
});

// Show start screen music + scores
window.addEventListener('load',()=>{
  renderScoreTable();
  startPanelCycling();
  playMusic('aud-title');
});

// Main loop
const STEP=1000/FPS;let acc=0,lastT=0;
function frame(now){
  const dt=now-lastT;lastT=now;acc+=dt;
  while(acc>=STEP){update();acc-=STEP;}
  render();
  if(!running)animateCentipede(now);
  requestAnimationFrame(frame);
}
requestAnimationFrame(t=>{lastT=t;requestAnimationFrame(frame);});
</script>
